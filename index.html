<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Welcome to MyWebsite. Learn about our services, privacy policy, and terms, and invite our bot to your server!">
  <title>My Website</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <style>
    /* General styles */
    body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; background: #f9f9f9; color: #333; scroll-behavior: smooth; }
    a { text-decoration: none; }

    /* Header / Nav */
    header { background: linear-gradient(90deg, #4f46e5, #06b6d4); color: #fff; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; transition: background 0.3s; }
    header:hover { background: linear-gradient(90deg, #6366f1, #22d3ee); }
    .logo { font-weight: bold; font-size: 1.5em; }
    nav { display: flex; gap: 15px; }
    nav a { color: #fff; padding: 6px 14px; border-radius: 6px; transition: background 0.3s; }
    nav a:hover { background-color: rgba(255,255,255,0.2); }

    /* Main content */
    main { padding: 60px 20px; max-width: 900px; margin: auto; background: #fff; border-radius: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); text-align: center; }
    h1 { color: #1f2937; font-size: 2.2em; margin-bottom: 20px; }
    p { margin-bottom: 30px; font-size: 1.1em; }
    .btn { display: inline-block; padding: 12px 24px; background-color: #4f46e5; color: #fff; border-radius: 6px; font-weight: bold; transition: background 0.3s; }
    .btn:hover { background-color: #6366f1; }

    /* Footer */
    footer { background-color: #e5e7eb; text-align: center; padding: 15px; margin-top: 40px; font-size: 0.9em; color: #555; }
    .social-links { margin-top: 10px; }
    .social-links a { margin: 0 8px; color: #4f46e5; font-weight: bold; transition: color 0.3s; }
    .social-links a:hover { color: #06b6d4; }

    /* Responsive */
    @media (max-width: 600px) {
      header { flex-direction: column; gap: 10px; }
      nav { flex-direction: column; width: 100%; }
      nav a { text-align: center; width: 100%; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">MyWebsite</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="privacy-policy.html">Privacy Policy</a>
      <a href="terms-of-service.html">Terms of Service</a>
    </nav>
  </header>

  <main>
    <h1>Welcome to My Website</h1>
    <p>Explore our services, read our Privacy Policy, and review our Terms of Service.</p>
    <a href="https://discord.com/oauth2/authorize?client_id=1445747320028139520&scope=bot" class="btn">Invite the Bot</a>
  </main>

  <footer>
    &copy; 2026 My Website. All rights reserved.
    <div class="social-links">
      <a href="#">Twitter</a> |
      <a href="#">GitHub</a>
    </div>
  </footer>
</body>
</html>
